name: Patrol report

# Free, keyless staleness report. No AI, no API keys, no network calls — this workflow
# only runs plain Node against the JSON already in the repo and commits the generated
# report. It never edits /data/*.json itself. The actual re-verification/editing work
# happens on demand, whenever a human pastes PATROL.md + AGENT_UPDATE.md to a chat AI —
# see AGENT_UPDATE.md for that half of the loop.
#
# Requires: nothing but the built-in GITHUB_TOKEN.
#   - Settings → Actions → General → Workflow permissions → "Read and write permissions"
#     (needed for the report commit + the kill-watch issue upsert below)
#   - If branch protection on main blocks direct pushes from Actions, either add an
#     exception for this workflow/the github-actions bot, or this workflow will fail
#     loudly at the "Commit report" step — that's an intentional safe failure, not a
#     silent one. The report itself is 100% generated/deterministic, which is why
#     committing it straight to main (no PR) is fine; nothing here writes to /data.

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday 09:00 UTC
  workflow_dispatch: {}     # allow manual runs

permissions:
  contents: write
  issues: write

concurrency:
  group: patrol-report
  cancel-in-progress: false

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate data
        run: node js/validate.js

      - name: Generate patrol report
        run: node scripts/patrol-report.js

      - name: Check for report changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain -- PATROL.md patrol-queue.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit report to main
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "patrol-bot"
          git config user.email "patrol-bot@users.noreply.github.com"
          git add PATROL.md patrol-queue.json
          git commit -m "patrol: refresh queue — $(date -u +%Y-%m-%d)"
          git push origin HEAD:main

      - name: Upsert kill-watch issue
        # This step must never fail the run — a report was already committed above
        # (or there was nothing to commit), and that's the job's actual deliverable.
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          KILLWATCH_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('patrol-queue.json','utf8')).kill_watch_alerts.length)")
          DATE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('patrol-queue.json','utf8')).generated_on_date)")

          gh label create "patrol-kill-watch" --color "B60205" \
            --description "Auto-managed by patrol.yml — a thesis kill_watch is within ~20% of triggering" \
            --force

          EXISTING=$(gh issue list --state open --label "patrol-kill-watch" \
            --json number --jq '.[0].number')

          if [ "$KILLWATCH_COUNT" -gt 0 ]; then
            {
              echo "Auto-generated by \`.github/workflows/patrol.yml\` from \`patrol-queue.json\` on $DATE."
              echo "This issue is kept in sync (edited, not duplicated) every run — do not close it manually while alerts are active; it will reopen or a duplicate will appear."
              echo ""
              node -e "
                const q = JSON.parse(require('fs').readFileSync('patrol-queue.json','utf8'));
                q.kill_watch_alerts.forEach(a => {
                  console.log('### 🔴 ' + a.thesisId + ' — proximity ' + Math.round(a.proximity*100) + '%');
                  console.log('');
                  console.log('- **Statement:** ' + a.statement);
                  console.log('- **Kill condition:** ' + a.killCondition);
                  console.log('- **Signal:** ' + a.signal);
                  console.log('- **Current value:** ' + a.currentValue + ' → **Trigger:** ' + a.triggerValue);
                  console.log('');
                });
              "
              echo "See [PATROL.md](../blob/main/PATROL.md) and [AGENT_UPDATE.md](../blob/main/AGENT_UPDATE.md) for how to act on this."
            } > /tmp/kill-watch-body.md

            if [ -n "$EXISTING" ]; then
              gh issue edit "$EXISTING" --title "🔴 Patrol: kill-watch active" --body-file /tmp/kill-watch-body.md
            else
              gh issue create --title "🔴 Patrol: kill-watch active" --body-file /tmp/kill-watch-body.md --label "patrol-kill-watch"
            fi
          else
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "No kill_watch entries at or above the alert threshold as of $DATE — closing."
              gh issue close "$EXISTING"
            fi
          fi
          exit 0
